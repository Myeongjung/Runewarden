<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 215" width="460" height="215">
  <defs>
    <radialGradient id="bg" cx="35%" cy="45%" r="65%">
      <stop offset="0%"   stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8E44AD" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8E44AD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="460" height="215" fill="url(#bg)"/>

  <!-- Atmospheric glows -->
  <ellipse cx="160" cy="110" rx="180" ry="120" fill="url(#glow1)" opacity="0.7"/>
  <ellipse cx="310" cy="100" rx="140" ry="100" fill="url(#glow2)" opacity="0.5"/>

  <!-- Hex grid decorative background (subtle) -->
  <g opacity="0.07" stroke="#D4AF37" stroke-width="0.8" fill="none">
    <polygon points="40,30 55,39 55,57 40,66 25,57 25,39"/>
    <polygon points="70,30 85,39 85,57 70,66 55,57 55,39"/>
    <polygon points="40,66 55,75 55,93 40,102 25,93 25,75"/>
    <polygon points="70,66 85,75 85,93 70,102 55,93 55,75"/>
    <polygon points="55,102 70,111 70,129 55,138 40,129 40,111"/>
    <polygon points="40,138 55,147 55,165 40,174 25,165 25,147"/>
    <polygon points="70,138 85,147 85,165 70,174 55,165 55,147"/>
  </g>

  <!-- Magic circle decoration (right side) -->
  <g transform="translate(370,108)" opacity="0.55">
    <circle r="72" fill="none" stroke="#D4AF37" stroke-width="1.2"/>
    <circle r="60" fill="none" stroke="#D4AF37" stroke-width="0.6" stroke-dasharray="8 5"/>
    <circle r="40" fill="none" stroke="#8E44AD" stroke-width="1"/>
    <!-- Hexagram -->
    <line x1="0" y1="-68" x2="59"  y2="34"  stroke="#D4AF37" stroke-width="0.7" opacity="0.5"/>
    <line x1="59" y1="34"  x2="-59" y2="34"  stroke="#D4AF37" stroke-width="0.7" opacity="0.5"/>
    <line x1="-59" y1="34" x2="0"   y2="-68" stroke="#D4AF37" stroke-width="0.7" opacity="0.5"/>
    <line x1="0"   y1="68"  x2="59"  y2="-34" stroke="#D4AF37" stroke-width="0.7" opacity="0.5"/>
    <line x1="59"  y1="-34" x2="-59" y2="-34" stroke="#D4AF37" stroke-width="0.7" opacity="0.5"/>
    <line x1="-59" y1="-34" x2="0"   y2="68"  stroke="#D4AF37" stroke-width="0.7" opacity="0.5"/>
    <!-- Center W -->
    <text x="0" y="12" text-anchor="middle" font-family="serif" font-size="32" font-weight="bold"
          fill="#D4AF37" filter="url(#glow)" opacity="0.9">W</text>
  </g>

  <!-- Tower silhouettes (left) -->
  <g fill="#2a2a5a" opacity="0.6">
    <rect x="28" y="120" width="18" height="65"/>
    <rect x="24" y="115" width="26" height="8" rx="1"/>
    <rect x="48" y="140" width="14" height="45"/>
    <rect x="45" y="136" width="20" height="7" rx="1"/>
  </g>

  <!-- Main Title -->
  <text x="195" y="98" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52" font-weight="bold" letter-spacing="6"
        fill="#D4AF37" filter="url(#textGlow)">RUNE</text>
  <text x="195" y="148" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52" font-weight="bold" letter-spacing="2"
        fill="#D4AF37" filter="url(#textGlow)">WARDEN</text>

  <!-- Subtitle -->
  <text x="195" y="175" text-anchor="middle"
        font-family="Georgia, serif" font-size="11"
        fill="#B0A060" letter-spacing="3" opacity="0.9">
    BUILD YOUR DECK · PLACE YOUR TOWERS · SURVIVE
  </text>

  <!-- Genre tags -->
  <g transform="translate(100,190)">
    <rect width="58" height="14" rx="3" fill="#8E44AD" opacity="0.7"/>
    <text x="29" y="10.5" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">ROGUELIKE</text>
  </g>
  <g transform="translate(164,190)">
    <rect width="68" height="14" rx="3" fill="#2980B9" opacity="0.7"/>
    <text x="34" y="10.5" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">DECK BUILDING</text>
  </g>
  <g transform="translate(238,190)">
    <rect width="72" height="14" rx="3" fill="#27AE60" opacity="0.7"/>
    <text x="36" y="10.5" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">TOWER DEFENSE</text>
  </g>

  <!-- Border glow -->
  <rect width="460" height="215" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.25"/>
</svg>
